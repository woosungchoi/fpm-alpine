name: dependency-freshness

on:
  schedule:
    - cron: '42 4 * * 1'
  workflow_dispatch:

concurrency:
  group: freshness-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Generate dependency freshness report
        env:
          REPORT_DIR: freshness-reports
          PHP_TAGS: "8.0 8.1 8.2 8.3 8.4 8.5"
          PECL_PACKAGES: "imagick redis apcu"
        run: ./scripts/report-freshness.sh

      - name: Upload dependency freshness report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dependency-freshness-report
          path: freshness-reports/
