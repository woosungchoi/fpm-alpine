name: dependency-freshness

on:
  schedule:
    - cron: '42 4 * * 1'
  workflow_dispatch:

concurrency:
  group: freshness-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Generate dependency freshness report
        env:
          REPORT_DIR: freshness-reports
          VERSIONS_PATH: build/versions.json
        run: ./scripts/report-freshness.sh

      - name: Upload dependency freshness report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-freshness-report
          path: freshness-reports/

      - name: Create issue when dependency updates are available
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/create-dependency-freshness-issue.sh
