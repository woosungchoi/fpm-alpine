name: dependency-update-pr

on:
  schedule:
    - cron: '15 5 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Discover and report candidates without creating pull requests
        required: true
        type: boolean
        default: true

permissions: {}

concurrency:
  group: dependency-update-pr
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      eligible_count: ${{ steps.summary.outputs.eligible_count }}
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require main source
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Discover dependency candidates
        run: |
          set -euo pipefail
          mkdir -p dependency-candidates
          python3 scripts/resolve-dependency-candidates.py \
            --output dependency-candidates/candidates.json

      - name: Validate candidate summary
        id: summary
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          data = json.loads(Path('dependency-candidates/candidates.json').read_text())
          if type(data.get('schemaVersion')) is not int or data['schemaVersion'] != 1:
              raise SystemExit('invalid candidate schema')
          candidates = data.get('candidates')
          warnings = data.get('warnings')
          if not isinstance(candidates, list) or not isinstance(warnings, list):
              raise SystemExit('invalid candidate collections')
          eligible = [row for row in candidates if row.get('eligible') is True]
          print(f'eligible_count={len(eligible)}')
          print(f'candidate_count={len(candidates)}')
          print(f'warning_count={len(warnings)}')
          PY

      - name: Upload candidate evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-candidates-${{ github.run_id }}-${{ github.run_attempt }}
          path: dependency-candidates/
          if-no-files-found: error

  create-prs:
    if: >-
      ${{ needs.discover.outputs.eligible_count != '0' &&
          vars.DEPENDENCY_AUTOMATION_ENABLED == 'true' &&
          (github.event_name == 'schedule' || inputs.dry_run == false) }}
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dependency-updater
    permissions:
      contents: read
    steps:
      - name: Create scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.DEPENDENCY_UPDATE_APP_ID }}
          private-key: ${{ secrets.DEPENDENCY_UPDATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: fpm-alpine
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout exact source with App token
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download candidate evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dependency-candidates-${{ github.run_id }}-${{ github.run_attempt }}
          path: dependency-candidates

      - name: Create one pull request per eligible candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          python3 - <<'PY' > /tmp/eligible-candidate-keys
          import json
          from pathlib import Path
          data = json.loads(Path('dependency-candidates/candidates.json').read_text())
          for row in data.get('candidates', []):
              if row.get('eligible') is True:
                  print(row['key'])
          PY
          while IFS= read -r candidate_key; do
            test -n "$candidate_key"
            ./scripts/create-dependency-update-pr.sh \
              dependency-candidates/candidates.json "$candidate_key"
          done < /tmp/eligible-candidate-keys
