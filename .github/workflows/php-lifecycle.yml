name: php-lifecycle

on:
  schedule:
    - cron: '19 5 1 * *'
  workflow_dispatch:

concurrency:
  group: php-lifecycle-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate versions metadata
        run: ./scripts/validate-versions.py

      - name: Check PHP lifecycle and upstream release source
        id: lifecycle
        continue-on-error: true
        run: ./scripts/check-php-lifecycle.py

      - name: Upload lifecycle report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: php-lifecycle-report
          path: lifecycle-reports/
          if-no-files-found: error

      - name: Create or update lifecycle issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/create-php-lifecycle-issue.sh

      - name: Preserve lifecycle failure
        if: steps.lifecycle.outcome != 'success'
        run: exit 1
