name: smoke-test

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      created: ${{ steps.metadata.outputs.created }}
      source_date_epoch: ${{ steps.metadata.outputs.source_date_epoch }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate pins and prepare matrix
        id: matrix
        run: |
          ./scripts/validate-versions.py
          matrix=$(python3 scripts/validate-versions.py --matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - name: Prepare explicit OCI creation time
        id: metadata
        run: |
          echo "created=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=$(git show -s --format=%ct "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

  dependency-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout full trusted history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run policy and mutation tests
        run: |
          set -euo pipefail
          ./tests/test_policy_scripts.sh
          ./tests/test_reproducible_build_policy.sh
          ./tests/test_publisher_policy.sh
          ./tests/test_smoke_script.sh
          python3 tests/test_php_lifecycle.py
          python3 tests/test_dockerhub_metadata.py
          python3 tests/test_dependency_automation.py
          python3 tests/test_dependency_candidates.py
          python3 tests/test_dependency_update_workflow.py
          python3 tests/test_action_update_policy.py
          python3 tests/test_image_contract_diff.py
          python3 tests/test_auto_merge_selection.py
          python3 tests/test_auto_promotion_eligibility.py
          python3 tests/test_dependency_control_workflows.py
          python3 tests/test_post_publish_failure_classifier.py
          python3 tests/test_reproducibility_archive.py

      - name: Verify action-only update provenance
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          action_only=true
          for path in "${changed[@]}"; do
            if [[ ! "$path" =~ ^\.github/workflows/.+\.ya?ml$ ]]; then
              action_only=false
              break
            fi
          done
          if [ "$action_only" = true ] && [ "${#changed[@]}" -gt 0 ]; then
            python3 scripts/verify-action-update.py --base-sha "$BASE_SHA" --head-sha "$HEAD_SHA"
          else
            echo "action_update=not-applicable"
          fi

      - name: Replay pinned source checksums
        run: python3 scripts/verify-source-checksums.py

  docker-smoke-matrix:
    name: docker-smoke-matrix (${{ matrix.php_minor }} / ${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require native runner architecture
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          host_arch="$(uname -m)"
          docker_arch="$(docker info --format '{{.Architecture}}')"
          case "$RUNNER_ARCH:$TARGET_ARCH:$host_arch:$docker_arch" in
            X64:amd64:x86_64:x86_64|ARM64:arm64:aarch64:aarch64)
              ;;
            *)
              printf 'runner/target architecture mismatch: runner=%s target=%s host=%s docker=%s\n' \
                "$RUNNER_ARCH" "$TARGET_ARCH" "$host_arch" "$docker_arch" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build source-only smoke image
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: fpm-alpine:smoke-${{ matrix.php_minor }}-${{ matrix.arch }}
          build-args: |
            PHP_BASE_IMAGE=${{ matrix.php_base_image }}
            IMAGICK_URL=${{ matrix.imagick_url }}
            IMAGICK_SHA256=${{ matrix.imagick_sha256 }}
            REDIS_URL=${{ matrix.redis_url }}
            REDIS_SHA256=${{ matrix.redis_sha256 }}
            APCU_URL=${{ matrix.apcu_url }}
            APCU_SHA256=${{ matrix.apcu_sha256 }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ matrix.php_patch }}
            OCI_CREATED=${{ needs.prepare.outputs.created }}
            SOURCE_DATE_EPOCH=${{ needs.prepare.outputs.source_date_epoch }}
          cache-from: type=gha,scope=php-${{ matrix.php_minor }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php_minor }}-${{ matrix.arch }}

      - name: Build reproducibility probe archive A
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          no-cache: true
          provenance: false
          sbom: false
          outputs: type=oci,dest=/tmp/repro-a-${{ matrix.php_minor }}-${{ matrix.arch }}.tar,rewrite-timestamp=true
          build-args: |
            PHP_BASE_IMAGE=${{ matrix.php_base_image }}
            IMAGICK_URL=${{ matrix.imagick_url }}
            IMAGICK_SHA256=${{ matrix.imagick_sha256 }}
            REDIS_URL=${{ matrix.redis_url }}
            REDIS_SHA256=${{ matrix.redis_sha256 }}
            APCU_URL=${{ matrix.apcu_url }}
            APCU_SHA256=${{ matrix.apcu_sha256 }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ matrix.php_patch }}
            OCI_CREATED=${{ needs.prepare.outputs.created }}
            SOURCE_DATE_EPOCH=${{ needs.prepare.outputs.source_date_epoch }}

      - name: Build reproducibility probe archive B
        env:
          SOURCE_DATE_EPOCH: ${{ needs.prepare.outputs.source_date_epoch }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          no-cache: true
          provenance: false
          sbom: false
          outputs: type=oci,dest=/tmp/repro-b-${{ matrix.php_minor }}-${{ matrix.arch }}.tar,rewrite-timestamp=true
          build-args: |
            PHP_BASE_IMAGE=${{ matrix.php_base_image }}
            IMAGICK_URL=${{ matrix.imagick_url }}
            IMAGICK_SHA256=${{ matrix.imagick_sha256 }}
            REDIS_URL=${{ matrix.redis_url }}
            REDIS_SHA256=${{ matrix.redis_sha256 }}
            APCU_URL=${{ matrix.apcu_url }}
            APCU_SHA256=${{ matrix.apcu_sha256 }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ matrix.php_patch }}
            OCI_CREATED=${{ needs.prepare.outputs.created }}
            SOURCE_DATE_EPOCH=${{ needs.prepare.outputs.source_date_epoch }}

      - name: Require reproducible OCI manifest
        env:
          FIRST_ARCHIVE: /tmp/repro-a-${{ matrix.php_minor }}-${{ matrix.arch }}.tar
          SECOND_ARCHIVE: /tmp/repro-b-${{ matrix.php_minor }}-${{ matrix.arch }}.tar
          REPRO_REPORT: reproducibility-reports/${{ matrix.php_minor }}-${{ matrix.arch }}.json
          EXPECTED_PLATFORM: ${{ matrix.platform }}
        run: |
          ./scripts/verify-local-reproducibility.sh \
            "$FIRST_ARCHIVE" \
            "$SECOND_ARCHIVE" \
            "$REPRO_REPORT" \
            "$EXPECTED_PLATFORM"

      - name: Run smoke test under target platform
        env:
          EXPECTED_PHP_MINOR: ${{ matrix.php_minor }}
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          EXPECTED_IMAGICK_VERSION: ${{ matrix.imagick_version }}
          EXPECTED_REDIS_VERSION: ${{ matrix.redis_version }}
          EXPECTED_APCU_VERSION: ${{ matrix.apcu_version }}
          EXPECTED_ICONV_IMPLEMENTATION: ${{ matrix.iconv_implementation }}
          EXPECTED_ICONV_VERSION: ${{ matrix.iconv_version }}
          EXPECTED_ICONV_PACKAGE: ${{ matrix.iconv_package }}
          EXPECTED_ICONV_PACKAGE_VERSION: ${{ matrix.iconv_package_version }}
          EXPECTED_ICONV_OWNER_PATH: ${{ matrix.iconv_owner_path }}
          EXPECTED_ICONV_TARGET: ${{ matrix.iconv_target }}
          SMOKE_REPORT_DIR: smoke-reports
          SMOKE_IMAGE: fpm-alpine:smoke-${{ matrix.php_minor }}-${{ matrix.arch }}
        run: ./scripts/smoke-test-image.sh "$SMOKE_IMAGE"

      - name: Compare package and runtime contract with published baseline
        env:
          PHP_MINOR: ${{ matrix.php_minor }}
          PLATFORM: ${{ matrix.platform }}
          BASELINE_IMAGE: woosungchoi/fpm-alpine:${{ matrix.php_minor }}
          CANDIDATE_IMAGE: fpm-alpine:smoke-${{ matrix.php_minor }}-${{ matrix.arch }}
          BASELINE_REPORT: contract-reports/baseline-${{ matrix.php_minor }}-${{ matrix.arch }}.json
          CANDIDATE_REPORT: contract-reports/candidate-${{ matrix.php_minor }}-${{ matrix.arch }}.json
        run: |
          set -euo pipefail
          mkdir -p contract-reports
          ./scripts/capture-image-contract.sh \
            "$BASELINE_IMAGE" \
            "$PLATFORM" \
            "$BASELINE_REPORT"
          ./scripts/capture-image-contract.sh \
            "$CANDIDATE_IMAGE" \
            "$PLATFORM" \
            "$CANDIDATE_REPORT"
          python3 scripts/compare-image-contract.py \
            "$BASELINE_REPORT" \
            "$CANDIDATE_REPORT" \
            "$PHP_MINOR"

      - name: Scan source-only image
        env:
          SMOKE_IMAGE: fpm-alpine:smoke-${{ matrix.php_minor }}-${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          ./scripts/scan-local-image.sh \
            "$SMOKE_IMAGE" \
            scan-reports \
            "$PLATFORM"

      - name: Upload smoke and dependency-safety reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-report-php-${{ matrix.php_minor }}-${{ matrix.arch }}
          path: |
            smoke-reports/
            contract-reports/
            scan-reports/
            reproducibility-reports/
          if-no-files-found: error

  docker-smoke:
    name: docker-smoke
    if: ${{ always() }}
    needs: [dependency-safety, docker-smoke-matrix]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require every dependency-safety and smoke matrix job to pass
        env:
          SAFETY_RESULT: ${{ needs.dependency-safety.result }}
          MATRIX_RESULT: ${{ needs.docker-smoke-matrix.result }}
        run: |
          test "$SAFETY_RESULT" = success
          test "$MATRIX_RESULT" = success
