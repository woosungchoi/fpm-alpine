name: smoke-test

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      manifest_image:
        description: "Optional published image ref to inspect (for example woosungchoi/fpm-alpine:8.5)"
        required: false
        type: string

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build image for smoke test
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: fpm-alpine:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        env:
          SMOKE_REPORT_DIR: smoke-reports
        run: ./scripts/smoke-test-image.sh fpm-alpine:smoke

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: smoke-report
          path: smoke-reports/

      - name: Inspect published multi-arch manifest (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.manifest_image != '' }}
        env:
          MANIFEST_RETRY_ATTEMPTS: "3"
          MANIFEST_RETRY_DELAY_SECONDS: "20"
        run: ./scripts/check-manifest.sh "${{ inputs.manifest_image }}"
