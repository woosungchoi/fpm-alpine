name: verify-published-manifest

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Optional single published image ref to inspect (for example woosungchoi/fpm-alpine:8.5)"
        required: false
        type: string

concurrency:
  group: verify-published-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-maintained-tags:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.image_ref == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        image_ref:
          - woosungchoi/fpm-alpine:8.2
          - woosungchoi/fpm-alpine:8.3
          - woosungchoi/fpm-alpine:8.4
          - woosungchoi/fpm-alpine:8.5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify published manifest
        env:
          IMAGE_REF: ${{ matrix.image_ref }}
          MANIFEST_RETRY_ATTEMPTS: "5"
          MANIFEST_RETRY_DELAY_SECONDS: "20"
        run: ./scripts/report-manifest.sh "$IMAGE_REF"

      - name: Upload manifest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-report-${{ strategy.job-index }}
          path: manifest-reports/

      - name: Create issue on manifest verification failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ matrix.image_ref }}
        run: scripts/create-manifest-failure-issue.sh

  verify-dockerhub-tag-policy:
    if: ${{ vars.DOCKERHUB_TAG_POLICY_ENFORCED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require exact public Docker Hub tag set
        run: ./scripts/verify-dockerhub-tag-policy.py --json-output tag-policy-report.json

      - name: Upload Docker Hub tag policy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dockerhub-tag-policy
          path: tag-policy-report.json
          if-no-files-found: error

  verify-single-input:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.image_ref != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify published manifest
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          MANIFEST_RETRY_ATTEMPTS: "5"
          MANIFEST_RETRY_DELAY_SECONDS: "20"
        run: ./scripts/report-manifest.sh "$IMAGE_REF"

      - name: Upload manifest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-single-input
          path: manifest-reports/

      - name: Create issue on manifest verification failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ inputs.image_ref }}
        run: scripts/create-manifest-failure-issue.sh
